<app-navbar></app-navbar>

<div class="profile-page">
  <div class="profile-card">
    
    <!-- LEFT PANEL -->
    <div class="left-panel">
      <!-- Avatar Upload -->
      <div class="avatar-container" (click)="fileInput.click()">
        <img *ngIf="profile.profileImage" [src]="profile.profileImage" class="avatar-img" />
        <div *ngIf="!profile.profileImage" class="avatar-img placeholder">
           <i class="fas fa-user"></i>
        </div>
        <div class="avatar-overlay">
          <span>Upload</span>
        </div>
      </div>
      <input type="file" #fileInput (change)="onFileSelected($event)" accept="image/*" style="display: none;" />

      <h2 class="first-name">{{ profile.fullName ? profile.fullName.split(' ')[0] : 'User' }}</h2>
      <span class="role-badge">{{profile.role || 'SYSTEM USER'}}</span>
      
      <div class="meta-info">
        <p>Joined: Feb 2026</p>
        <p>Location: {{profile.region || 'Not Set'}}</p>
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">
      <h2 class="section-title">Personal Information</h2>
      
      <div class="info-grid">
        <div class="info-item">
          <label>Full Name:</label>
          <input type="text" [(ngModel)]="profile.fullName" placeholder="Enter Full Name..." />
        </div>
        <div class="info-item">
          <label>Role:</label>
          <input type="text" [value]="profile.role || 'System Administrator'" disabled />
        </div>
        <div class="info-item">
          <label>Email Address:</label>
          <input type="text" [value]="profile.email" disabled />
        </div>
        <div class="info-item">
          <label>Phone Number:</label>
          <input type="text" [(ngModel)]="profile.phoneNumber" placeholder="Enter Phone..." />
        </div>
        <div class="info-item" style="grid-column: span 2;">
          <label>Region:</label>
          <input type="text" [(ngModel)]="profile.region" placeholder="Enter Region (e.g. Bengaluru, IN)..." />
        </div>
      </div>

      <div class="action-row">
        <button class="btn-save" (click)="updateProfile()" [disabled]="isUpdating">
          {{ isUpdating ? 'Saving...' : 'Update Profile' }}
        </button>
        <span class="success-msg" *ngIf="successMessage">
          <i class="fas fa-check"></i> {{successMessage}}
        </span>
      </div>

    </div>
  </div>
</div>
