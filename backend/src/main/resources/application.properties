spring.application.name=demo
server.port=8443
spring.datasource.url=jdbc:mysql://localhost:3310/disaster_management
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JWT Configuration
jwt.secret=${JWT_SECRET:mySecretKeyForDisasterManagementSystem123456789}
jwt.expiration=3600000

# OpenWeather API Configuration (free tier: https://openweathermap.org/api)
# Get your free API key at https://home.openweathermap.org/api_keys
openweather.api.key=${OPENWEATHER_API_KEY:34de738c9ce9fa5850ef52d26901afe7}

# Scheduling
spring.main.allow-bean-definition-overriding=true
